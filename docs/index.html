<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#111f30">
<title>Dienstplaner</title>
<style>
/* Dienstplaner mobil - Navy/Gold "nautisches Instrument", mobile-first (412px).
   Dunkel = Standard, hell per data-theme="light". Touch >=44px, Basis 16px. */

:root {
  --font: ui-sans-serif, system-ui, Roboto, "Segoe UI", sans-serif;
  --mono: ui-monospace, "Roboto Mono", Consolas, monospace;
  --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-pill: 999px;
  --tap: 44px;
  --px-h: 56px;               /* Pixel pro Stunde in der Tagesansicht */
  --ease: cubic-bezier(.22,1,.36,1);
}
:root, :root[data-theme="dark"] {
  color-scheme: dark;
  --bg: oklch(0.16 0.03 245);
  --surface: oklch(0.205 0.032 245);
  --surface-2: oklch(0.25 0.034 245);
  --surface-3: oklch(0.30 0.034 245);
  --line: oklch(0.34 0.028 245);
  --line-strong: oklch(0.45 0.03 245);
  --ink: oklch(0.96 0.01 240);
  --ink-mut: oklch(0.76 0.022 240);
  --ink-faint: oklch(0.60 0.02 240);
  --accent: oklch(0.83 0.11 84);
  --accent-strong: oklch(0.72 0.13 78);
  --accent-ink: oklch(0.20 0.04 80);
  --accent-soft: oklch(0.83 0.11 84 / .14);
  --brass: oklch(0.66 0.09 82 / .55);
  --danger: oklch(0.68 0.18 25); --warning: oklch(0.82 0.13 78);
  --success: oklch(0.74 0.13 155); --info: oklch(0.74 0.09 235);
  --danger-soft: oklch(0.68 0.18 25 / .15); --warning-soft: oklch(0.82 0.13 78 / .15);
  --success-soft: oklch(0.74 0.13 155 / .15);
  --shadow: 0 10px 30px -10px rgb(0 0 0 / .6);
  --grid: oklch(0.34 0.028 245 / .55);
  --today: oklch(0.83 0.11 84 / .06);
}
:root[data-theme="light"] {
  color-scheme: light;
  --bg: oklch(0.975 0.006 240);
  --surface: oklch(1 0 0); --surface-2: oklch(0.965 0.008 240); --surface-3: oklch(0.94 0.01 240);
  --line: oklch(0.90 0.01 240); --line-strong: oklch(0.80 0.014 240);
  --ink: oklch(0.24 0.03 245); --ink-mut: oklch(0.45 0.03 245); --ink-faint: oklch(0.58 0.025 245);
  --accent: oklch(0.62 0.13 78); --accent-strong: oklch(0.54 0.14 72); --accent-ink: oklch(1 0 0);
  --accent-soft: oklch(0.62 0.13 78 / .12); --brass: oklch(0.62 0.10 78 / .5);
  --danger: oklch(0.55 0.20 27); --warning: oklch(0.60 0.14 68);
  --success: oklch(0.55 0.13 155); --info: oklch(0.55 0.11 240);
  --danger-soft: oklch(0.55 0.20 27 / .10); --warning-soft: oklch(0.70 0.15 70 / .14);
  --success-soft: oklch(0.55 0.13 155 / .10);
  --shadow: 0 12px 28px -12px rgb(20 30 50 / .25);
  --grid: oklch(0.90 0.01 240); --today: oklch(0.62 0.13 78 / .06);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font); font-size: 16px; line-height: 1.45;
  background: var(--bg); color: var(--ink);
  -webkit-font-smoothing: antialiased; overflow: hidden;
  overscroll-behavior: none;
}
button, input, select, textarea { font: inherit; color: inherit; }
button { background: none; border: none; padding: 0; cursor: pointer; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: var(--r-sm); }
.mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }

/* ------------------------------- Shell -------------------------------- */
#app { height: 100dvh; display: flex; flex-direction: column; }
.screen { flex: 1; min-height: 0; overflow: auto; -webkit-overflow-scrolling: touch; }

.hdr {
  display: flex; align-items: center; gap: 8px;
  padding: max(10px, env(safe-area-inset-top)) 12px 10px;
  background: color-mix(in oklab, var(--surface) 70%, var(--bg));
  border-bottom: 1px solid var(--line); flex: none;
}
.hdr__title { font-weight: 650; font-size: 17px; letter-spacing: -0.01em; display: flex; align-items: center; gap: 8px; min-width: 0; }
.hdr__title span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hdr__spacer { flex: 1; }
.dot { width: 10px; height: 10px; border-radius: 50%; flex: none; }

/* Bottom-Tabs */
.tabs {
  display: grid; grid-template-columns: repeat(5, 1fr); flex: none;
  background: var(--surface); border-top: 1px solid var(--line);
  padding-bottom: env(safe-area-inset-bottom);
}
.tabs button {
  min-height: 56px; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; color: var(--ink-faint); font-size: 11px; font-weight: 550;
}
.tabs button svg { width: 22px; height: 22px; }
.tabs button.on { color: var(--accent); }
.tabs button.on svg { filter: drop-shadow(0 0 6px var(--accent-soft)); }

/* ------------------------------ Buttons ------------------------------- */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  min-height: var(--tap); padding: 10px 16px; border-radius: var(--r-md);
  background: var(--surface-2); border: 1px solid var(--line-strong);
  font-weight: 600; font-size: 15.5px; white-space: nowrap;
}
.btn svg { width: 19px; height: 19px; }
.btn:active { transform: translateY(1px); }
.btn--pri {
  background: linear-gradient(180deg, var(--accent), var(--accent-strong));
  color: var(--accent-ink); border-color: var(--accent-strong);
}
.btn--ghost { background: transparent; border-color: transparent; color: var(--ink-mut); }
.btn--icon { min-width: var(--tap); padding: 10px; }
.btn--sm { min-height: 38px; padding: 7px 12px; font-size: 14px; }
.btn--danger { color: var(--danger); border-color: color-mix(in oklab, var(--danger) 40%, var(--line)); }
.btn--block { width: 100%; }
.btn:disabled { opacity: .5; }

/* ------------------------------ Plan ---------------------------------- */
.weekstrip { display: flex; gap: 4px; padding: 8px 10px; overflow-x: auto; flex: none;
  background: var(--surface); border-bottom: 1px solid var(--line); scrollbar-width: none; }
.weekstrip::-webkit-scrollbar { display: none; }
.wchip {
  flex: 1 0 48px; min-height: 52px; border-radius: var(--r-md);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--ink-mut); border: 1px solid transparent; position: relative;
}
.wchip small { font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em; }
.wchip b { font-size: 17px; font-variant-numeric: tabular-nums; }
.wchip.today b { color: var(--accent); }
.wchip.on { background: var(--accent-soft); border-color: var(--brass); color: var(--ink); }
.wchip .load { position: absolute; bottom: 4px; display: flex; gap: 2px; }
.wchip .load i { width: 4px; height: 4px; border-radius: 50%; background: var(--ink-faint); }
.wchip.hol::after { content: "†"; position: absolute; top: 2px; right: 6px; color: var(--warning); font-size: 10px; }

.planbar { display: flex; gap: 8px; padding: 8px 12px; align-items: center; flex: none;
  border-bottom: 1px solid var(--line); background: color-mix(in oklab, var(--surface) 45%, var(--bg)); }
.planbar .kw { font-weight: 650; font-size: 15px; }
.planbar .rng { font-size: 12px; color: var(--ink-mut); font-family: var(--mono); }

.hours { display: flex; gap: 6px; padding: 8px 12px; overflow-x: auto; flex: none; scrollbar-width: none; }
.hours::-webkit-scrollbar { display: none; }
.hchip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 11px; border-radius: var(--r-pill);
  background: var(--surface-2); border: 1px solid var(--line); font-size: 13px; white-space: nowrap; }
.hchip i { width: 9px; height: 9px; border-radius: 50%; }
.hchip .mono { color: var(--ink-mut); }

/* Wochenraster: Hochformat = breite Spalten + horizontales Wischen (Snap),
   breite Screens = alle 7 Spalten sichtbar. Zeitachse + Tageskoepfe sticky. */
#calwrap { overscroll-behavior-x: contain; scroll-snap-type: x proximity; scroll-padding-left: 48px; }
.cal { display: grid; min-height: 100%; width: max-content; }
.cal--week { grid-template-columns: 48px repeat(7, 172px); }
@media (min-width: 700px) {
  .cal { width: auto; }
  .cal--week { grid-template-columns: 46px repeat(7, minmax(96px, 1fr)); min-width: 700px; }
}
.cal .corner { position: sticky; top: 0; left: 0; z-index: 8; background: var(--surface);
  border-bottom: 1px solid var(--line); border-right: 1px solid var(--line); }
.cal .axis { position: sticky; left: 0; z-index: 7; background: var(--bg); border-right: 1px solid var(--line); }
.dhead, .dcol { scroll-snap-align: start; }
.cal .tick { position: absolute; right: 6px; transform: translateY(-50%);
  font-size: 11px; color: var(--ink-faint); font-family: var(--mono); }
.cal .tick::after { content: ""; position: absolute; right: -6px; top: 50%; width: 4px; height: 1px; background: var(--brass); }
.dcol {
  position: relative; border-left: 1px solid var(--line);
  background-image: repeating-linear-gradient(to bottom, var(--grid) 0 1px, transparent 1px var(--px-h));
}
.dcol.today { background-color: var(--today); }
.dcol.closed { background-image:
  repeating-linear-gradient(to bottom, var(--grid) 0 1px, transparent 1px var(--px-h)),
  repeating-linear-gradient(-45deg, transparent 0 9px, color-mix(in oklab, var(--ink-faint) 8%, transparent) 9px 10px); }
.dcol .edge { position: absolute; left: 0; right: 0; pointer-events: none;
  background: repeating-linear-gradient(-45deg, transparent 0 8px, color-mix(in oklab, var(--ink-faint) 7%, transparent) 8px 9px); }
.dhead { position: sticky; top: 0; z-index: 5; background: var(--surface); border-bottom: 1px solid var(--line);
  border-left: 1px solid var(--line); padding: 7px 10px; font-size: 14px; font-weight: 650; }
.dhead.today { color: var(--accent); box-shadow: inset 0 -2px 0 var(--accent); }
.dhead small { display: block; color: var(--warning); font-weight: 500; font-size: 11px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.allday { display: flex; flex-wrap: wrap; gap: 4px; padding: 6px 10px; flex: none;
  border-bottom: 1px solid var(--line); background: color-mix(in oklab, var(--surface) 80%, var(--bg)); }
.allday:empty { display: none; }
.schip { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: var(--r-pill);
  font-size: 12.5px; font-weight: 550; border: 1px solid color-mix(in oklab, var(--c, var(--line)) 55%, var(--line));
  background: color-mix(in oklab, var(--c, var(--surface-2)) 18%, var(--surface)); }
.schip i { width: 8px; height: 8px; border-radius: 50%; background: var(--c, var(--ink-faint)); }

.shift {
  position: absolute; left: 3px; right: 3px; border-radius: var(--r-sm);
  padding: 4px 8px; overflow: hidden; color: #fff;
  border: 1px solid rgb(0 0 0 / .2); box-shadow: 0 1px 3px rgb(0 0 0 / .35), inset 0 1px 0 rgb(255 255 255 / .16);
  display: flex; flex-direction: column; gap: 1px; min-height: 22px;
}
.shift b { font-size: 14px; letter-spacing: .01em; }
.shift .t { font-family: var(--mono); font-size: 12px; opacity: .92; }
.shift .l { font-size: 12px; opacity: .92; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.shift.locked { box-shadow: 0 1px 3px rgb(0 0 0 / .35), inset 0 0 0 2px var(--accent); }
.shift.home::after { content: "⌂"; position: absolute; top: 3px; right: 7px; font-size: 12px; opacity: .8; }
.shift[data-kind="telefon"] { border-style: dashed; }
@media (min-width: 700px) {
  .cal--week .shift b { font-size: 12px; }
  .cal--week .shift .t { font-size: 10px; }
}
.nowline { position: absolute; left: 0; right: 0; height: 2px; background: var(--accent); z-index: 4; pointer-events: none; }
.nowline::before { content: ""; position: absolute; left: -1px; top: -3px; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }

/* ------------------------------ Listen-Screens ------------------------ */
.page { padding: 14px 14px calc(20px + env(safe-area-inset-bottom)); display: flex; flex-direction: column; gap: 14px; }
.page h1 { font-size: 20px; font-weight: 650; letter-spacing: -0.01em; }
.page h2 { font-size: 16px; font-weight: 650; display: flex; align-items: center; gap: 8px; }
.muted { color: var(--ink-mut); font-size: 14px; }
.card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 14px; display: flex; flex-direction: column; gap: 10px; }
.rowhead { display: flex; align-items: center; gap: 8px; }
.rowhead .sp { flex: 1; }
.list { display: flex; flex-direction: column; gap: 6px; }
.item { display: flex; align-items: center; gap: 10px; min-height: var(--tap);
  padding: 8px 12px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md); text-align: left; width: 100%; }
.item .bar { width: 6px; align-self: stretch; border-radius: 3px; flex: none; background: var(--c, var(--line-strong)); }
.item .bd { flex: 1; min-width: 0; }
.item .ti { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item .mt { font-size: 12.5px; color: var(--ink-mut); font-family: var(--mono); }
.item .tag { font-size: 11.5px; font-weight: 600; padding: 2px 9px; border-radius: var(--r-pill); flex: none;
  border: 1px solid color-mix(in oklab, var(--c, var(--line)) 50%, var(--line));
  color: var(--c, var(--ink-mut)); background: color-mix(in oklab, var(--c, transparent) 12%, transparent); }
.empty { border: 1px dashed var(--line-strong); border-radius: var(--r-md); padding: 12px; color: var(--ink-faint); font-size: 14px; }

.warnitem { display: flex; gap: 10px; padding: 10px 12px; border-radius: var(--r-md);
  background: var(--surface-2); border: 1px solid var(--line); }
.warnitem i { width: 9px; height: 9px; border-radius: 50%; background: var(--warning); margin-top: 6px; flex: none; }
.warnitem[data-sev="high"] i { background: var(--danger); }
.warnitem .d { font-family: var(--mono); font-size: 12px; color: var(--ink-faint); }

/* ------------------------------ Sheets (Editoren) --------------------- */
dialog.sheet { border: none; padding: 0; background: transparent; width: 100%; max-width: 560px;
  margin: auto auto 0; max-height: 92dvh; }
dialog.sheet::backdrop { background: rgb(0 0 0 / .5); }
.sheet__box { background: var(--surface); border: 1px solid var(--line-strong); border-bottom: none;
  border-radius: var(--r-lg) var(--r-lg) 0 0; box-shadow: var(--shadow);
  display: flex; flex-direction: column; max-height: 92dvh; }
.sheet__grip { width: 40px; height: 4px; border-radius: 2px; background: var(--line-strong); margin: 10px auto 2px; flex: none; }
.sheet__head { display: flex; align-items: center; gap: 10px; padding: 8px 16px; flex: none; }
.sheet__head .ti { font-size: 17px; font-weight: 650; flex: 1; }
.sheet__body { overflow: auto; padding: 6px 16px 12px; display: flex; flex-direction: column; gap: 14px; }
.sheet__foot { display: flex; gap: 10px; padding: 12px 16px calc(14px + env(safe-area-inset-bottom)); border-top: 1px solid var(--line); flex: none; }
.sheet__foot .sp { flex: 1; }

.field { display: flex; flex-direction: column; gap: 6px; }
.field > label { font-size: 13px; font-weight: 550; color: var(--ink-mut); }
.frow { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.ctl { width: 100%; min-height: var(--tap); padding: 10px 12px; border-radius: var(--r-md);
  background: var(--surface-2); border: 1px solid var(--line-strong); font-size: 16px; }
.ctl:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
select.ctl { appearance: none; }
textarea.ctl { min-height: 90px; resize: vertical; font-family: var(--mono); font-size: 14px; }
input[type="time"].ctl, input[type="date"].ctl { font-family: var(--mono); }
input[type="color"].ctl { padding: 4px; height: var(--tap); }
.check { display: flex; align-items: center; gap: 10px; min-height: var(--tap); font-size: 15.5px; }
.check input { width: 22px; height: 22px; accent-color: var(--accent); }
.seg { display: flex; background: var(--surface-2); border: 1px solid var(--line-strong); border-radius: var(--r-md); padding: 3px; gap: 3px; }
.seg button { flex: 1; min-height: 40px; border-radius: 9px; font-size: 14.5px; font-weight: 550; color: var(--ink-mut); }
.seg button.on { background: var(--surface-3); color: var(--ink); box-shadow: 0 1px 2px rgb(0 0 0 / .3); }
.wdgrid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.wdgrid .c { display: flex; flex-direction: column; gap: 3px; align-items: stretch; }
.wdgrid small { text-align: center; font-size: 10.5px; color: var(--ink-faint); text-transform: uppercase; }
.wdgrid select { min-height: 40px; padding: 4px 2px; text-align: center; font-size: 13px;
  border-radius: var(--r-sm); background: var(--surface-2); border: 1px solid var(--line-strong); }
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip { display: inline-flex; align-items: center; gap: 7px; min-height: 40px; padding: 7px 13px;
  border-radius: var(--r-md); border: 1px solid var(--line-strong); background: var(--surface-2); font-size: 14.5px; }
.chip input { width: 18px; height: 18px; accent-color: var(--accent); }
.chip:has(input:checked) { border-color: var(--accent); background: var(--accent-soft); }

/* Verfuegbarkeits-Vorschau */
.avtable { width: 100%; border-collapse: collapse; font-size: 13.5px; }
.avtable th, .avtable td { border: 1px solid var(--line); padding: 6px 4px; text-align: center; }
.avtable th { background: var(--surface-2); font-size: 11px; color: var(--ink-mut); }
.avtable td.nm { text-align: left; min-width: 130px; }
.avcell { font-weight: 600; border-radius: 6px; padding: 2px 6px; font-size: 12px; }
.av-yes { color: var(--success); background: var(--success-soft); }
.av-no { color: var(--danger); background: var(--danger-soft); }
.av-vm, .av-nm2 { color: var(--info); background: color-mix(in oklab, var(--info) 14%, transparent); }
.avwarn { color: var(--warning); font-size: 12px; }
.scrollx { overflow-x: auto; }

/* Toast */
.toasts { position: fixed; bottom: calc(70px + env(safe-area-inset-bottom)); left: 12px; right: 12px;
  display: flex; flex-direction: column; gap: 8px; align-items: center; z-index: 60; pointer-events: none; }
.toast { display: flex; align-items: center; gap: 10px; max-width: 100%;
  padding: 11px 16px; border-radius: var(--r-md); background: var(--surface-3);
  border: 1px solid var(--line-strong); box-shadow: var(--shadow); font-size: 14.5px;
  animation: tin .19s var(--ease); }
.toast i { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex: none; }
.toast[data-k="success"] i { background: var(--success); }
.toast[data-k="error"] i { background: var(--danger); }
@keyframes tin { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

.badge { min-width: 20px; height: 20px; padding: 0 6px; border-radius: var(--r-pill);
  background: var(--warning-soft); color: var(--warning); border: 1px solid color-mix(in oklab, var(--warning) 45%, var(--line));
  font-size: 12px; font-weight: 650; display: inline-flex; align-items: center; justify-content: center; }
.badge.ok { background: var(--success-soft); color: var(--success); border-color: color-mix(in oklab, var(--success) 40%, var(--line)); }

.fab-row { display: flex; gap: 8px; padding: 8px 12px; flex: none; border-top: 1px solid var(--line);
  background: color-mix(in oklab, var(--surface) 60%, var(--bg)); }
.fab-row .btn { flex: 1; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
}

</style>
</head>

<div id="app"></div>
<script>
/* Deutsche gesetzliche Feiertage - offline berechnet.
   Port von backend/holidays.py. Nur HINWEIS: Zentren koennen geoeffnet sein. */
(function () {
  const DP = (globalThis.DP = globalThis.DP || {});

  const BUNDESLAENDER = {
    BW: "Baden-Wuerttemberg", BY: "Bayern", BE: "Berlin", BB: "Brandenburg",
    HB: "Bremen", HH: "Hamburg", HE: "Hessen", MV: "Mecklenburg-Vorpommern",
    NI: "Niedersachsen", NW: "Nordrhein-Westfalen", RP: "Rheinland-Pfalz",
    SL: "Saarland", SN: "Sachsen", ST: "Sachsen-Anhalt", SH: "Schleswig-Holstein",
    TH: "Thueringen",
  };

  function iso(d) {
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
  }
  function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }

  // Ostersonntag (anonymer gregorianischer Algorithmus)
  function easterSunday(year) {
    const a = year % 19, b = Math.floor(year / 100), c = year % 100;
    const d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25);
    const g = Math.floor((b - f + 1) / 3);
    const h = (19 * a + b - d - g + 15) % 30;
    const i = Math.floor(c / 4), k = c % 4;
    const l = (32 + 2 * e + 2 * i - h - k) % 7;
    const m = Math.floor((a + 11 * h + 22 * l) / 451);
    const month = Math.floor((h + l - 7 * m + 114) / 31);
    const day = ((h + l - 7 * m + 114) % 31) + 1;
    return new Date(year, month - 1, day);
  }

  function bussUndBettag(year) {
    let d = new Date(year, 10, 22); // 22. November
    while (d.getDay() !== 3) d = addDays(d, -1); // Mittwoch davor
    return d;
  }

  /** {"YYYY-MM-DD": "Name"} fuer Jahr + (optional) Bundesland. */
  function holidaysFor(year, bundesland) {
    const bl = (bundesland || "").toUpperCase();
    const e = easterSunday(year);
    const out = {};
    const add = (d, name) => { out[iso(d)] = name; };

    add(new Date(year, 0, 1), "Neujahr");
    add(addDays(e, -2), "Karfreitag");
    add(addDays(e, 1), "Ostermontag");
    add(new Date(year, 4, 1), "Tag der Arbeit");
    add(addDays(e, 39), "Christi Himmelfahrt");
    add(addDays(e, 50), "Pfingstmontag");
    add(new Date(year, 9, 3), "Tag der Deutschen Einheit");
    add(new Date(year, 11, 25), "1. Weihnachtstag");
    add(new Date(year, 11, 26), "2. Weihnachtstag");

    if (["BW", "BY", "ST"].includes(bl)) add(new Date(year, 0, 6), "Heilige Drei Koenige");
    if (["BE", "MV"].includes(bl)) add(new Date(year, 2, 8), "Internationaler Frauentag");
    if (bl === "BB") { add(e, "Ostersonntag"); add(addDays(e, 49), "Pfingstsonntag"); }
    if (["BW", "BY", "HE", "NW", "RP", "SL"].includes(bl)) add(addDays(e, 60), "Fronleichnam");
    if (["SL", "BY"].includes(bl)) add(new Date(year, 7, 15), "Mariae Himmelfahrt");
    if (bl === "TH") add(new Date(year, 8, 20), "Weltkindertag");
    if (["BB", "HB", "HH", "MV", "NI", "SN", "ST", "SH", "TH"].includes(bl))
      add(new Date(year, 9, 31), "Reformationstag");
    if (["BW", "BY", "NW", "RP", "SL"].includes(bl)) add(new Date(year, 10, 1), "Allerheiligen");
    if (bl === "SN") add(bussUndBettag(year), "Buss- und Bettag");

    return out;
  }

  DP.holidays = { BUNDESLAENDER, easterSunday, holidaysFor };
})();

/* Datenmodell: ein JSON-Dokument statt SQLite.
   Tabellen -> Arrays, Feldnamen identisch zu backend/db.py (Portierung 1:1).

(function () {
  const DP = (globalThis.DP = globalThis.DP || {});

  const TABLES = [
    "locations", "rooms", "operating_hours", "coverage_blocks", "employees",
    "week_availability", "absences", "courses", "assignments", "patterns",
    "templates", "special_days", "tasks",
  ];

  const MO = 0, DI = 1, MI = 2, DO = 3, FR = 4, SA = 5, SO = 6;

  function emptyDoc() {
    const doc = { schema: "dienstplaner-mobil-v1", settings: {}, nextId: {} };
    TABLES.forEach((t) => { doc[t] = []; doc.nextId[t] = 1; });
    return doc;
  }

  function insert(doc, table, row) {
    const id = doc.nextId[table]++;
    const rec = Object.assign({ id }, row);
    doc[table].push(rec);
    return rec;
  }

  function update(doc, table, id, patch) {
    const rec = doc[table].find((r) => r.id === id);
    if (rec) Object.assign(rec, patch);
    return rec || null;
  }

  function remove(doc, table, id) {
    const i = doc[table].findIndex((r) => r.id === id);
    if (i >= 0) { doc[table].splice(i, 1); return true; }
    return false;
  }

  const byId = (doc, table, id) => doc[table].find((r) => r.id === id) || null;
  const where = (doc, table, pred) => doc[table].filter(pred);

  /* ------------------------- Demo-Seed (aus seed.py) ------------------- */
  function defaultSettings() {

  function seedDemo(doc) {

      ["DA", "Mara Jung", "MJ", "#B5654B", "Vollzeit", 40, ["Trainer", "Schliessberechtigt", "Ersthelfer"], 1, 1, 1, [], []],

    employees.forEach(([lk, name, kz, color, typ, wh, roles, kzu, kalone, homeoff, school, nogo], sort) => {

  /* Migration bestehender Datenbestaende: jeder Standort hat mind. 5 Raeume. */
  function migrate(doc) {

/* Auto-Planer - 1:1-Portierung von backend/planner.py.
   Arbeitet auf dem JSON-Dokument (DP.model) statt SQLite.
   Wochentag-Konvention: 0=Mo .. 6=So. Zeiten als "HH:MM". */
(function () {
  const DP = (globalThis.DP = globalThis.DP || {});

  const DAY_SPLIT = 14 * 60;

  /* ------------------------------ Zeit-Helfer ------------------------- */
  const toMin = (hhmm) => {
    if (!hhmm) return null;
    const [h, m] = hhmm.split(":");
    return +h * 60 + +m;
  };
  const toHHMM = (min) => `${String(Math.floor(min / 60)).padStart(2, "0")}:${String(min % 60).padStart(2, "0")}`;
  const overlaps = (aS, aE, bS, bE) => aS < bE && bS < aE;
  const isFree = (intervals, s, e) => intervals.every(([bs, be]) => !overlaps(s, e, bs, be));

  /* ISO-Wochen-Helfer (Datum <-> KW) */
  function isoWeekOf(date) {
    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    const dayNum = (d.getUTCDay() + 6) % 7;
    d.setUTCDate(d.getUTCDate() - dayNum + 3);
    const firstThu = new Date(Date.UTC(d.getUTCFullYear(), 0, 4));
    const week = 1 + Math.round(((d - firstThu) / 864e5 - 3 + ((firstThu.getUTCDay() + 6) % 7)) / 7);
    return { year: d.getUTCFullYear(), week };
  }
  /** Datum (lokal) des Wochentags `dow` (1=Mo..7=So) der ISO-Woche year/week. */
  function dateFromISOWeek(year, week, dow) {
    const jan4 = new Date(Date.UTC(year, 0, 4));
    const mon1 = new Date(jan4);
    mon1.setUTCDate(jan4.getUTCDate() - ((jan4.getUTCDay() + 6) % 7));
    const d = new Date(mon1);
    d.setUTCDate(mon1.getUTCDate() + (week - 1) * 7 + (dow - 1));
    return `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, "0")}-${String(d.getUTCDate()).padStart(2, "0")}`;
  }
  const weekdayOfISO = (isoDate) => {
    const [y, m, d] = isoDate.split("-").map(Number);
    return (new Date(Date.UTC(y, m - 1, d)).getUTCDay() + 6) % 7; // 0=Mo
  };
  const prevDateISO = (isoDate) => {
    const [y, m, d] = isoDate.split("-").map(Number);
    const dt = new Date(Date.UTC(y, m - 1, d));
    dt.setUTCDate(dt.getUTCDate() - 1);
    return `${dt.getUTCFullYear()}-${String(dt.getUTCMonth() + 1).padStart(2, "0")}-${String(dt.getUTCDate()).padStart(2, "0")}`;
  };

  /* ------------------------------ Kontext ----------------------------- */
  function loadContext(doc, locationId, year, week) {
    const loc = DP.model.byId(doc, "locations", locationId);
    const emps = doc.employees
      .filter((e) => e.location_id === locationId && e.active)
      .sort((a, b) => (a.sort || 0) - (b.sort || 0) || a.id - b.id);
    const empIds = new Set(emps.map((e) => e.id));

    const op = {};
    doc.operating_hours.filter((r) => r.location_id === locationId).forEach((r) => { op[r.weekday] = r; });

    const cov = {};
    doc.coverage_blocks.filter((r) => r.location_id === locationId).forEach((r) => {
      (cov[r.weekday] = cov[r.weekday] || []).push(r);
    });

    const inWeek = (r) => r.location_id === locationId && r.iso_year === year && r.iso_week === week;
    const courses = doc.courses.filter(inWeek);
    const tasks = doc.tasks.filter(inWeek);

    const special = {};
    doc.special_days.filter((r) => r.location_id === locationId).forEach((r) => { special[r.date] = r; });

    const absences = {};
    emps.forEach((e) => { absences[e.id] = []; });
    doc.absences.forEach((a) => {
      if (a.iso_year === year && a.iso_week === week && empIds.has(a.employee_id))
        absences[a.employee_id].push(a);
    });

    const wa = {};
    doc.week_availability.forEach((r) => {
      if (r.iso_year === year && r.iso_week === week && empIds.has(r.employee_id))
        wa[r.employee_id + ":" + r.weekday] = r.mode;
    });

    const locked = doc.assignments.filter((a) => inWeek(a) && a.locked);

    return { loc, employees: emps, op, cov, courses, tasks, special, absences, wa, locked, settings: doc.settings };
  }

  /* --------------------------- Verfuegbarkeit ------------------------- */
  function dayOpenClose(ctx, weekday, dateISO) {
    const sp = ctx.special[dateISO];
    if (sp) {
      if (sp.closed) return null;
      if (sp.open_time && sp.close_time) return [toMin(sp.open_time), toMin(sp.close_time)];
    }
    const row = ctx.op[weekday];
    if (!row || row.closed || !row.open_time) return null;
    return [toMin(row.open_time), toMin(row.close_time)];
  }

  function absenceHits(a, dateISO) {
    if (!a.date) return true;
    if (a.end_date) return a.date <= dateISO && dateISO <= a.end_date;
    return a.date === dateISO;
  }

  /** Onsite-Fenster [start,end] oder null; soft=true bei Wunsch-frei. */
  function onsiteWindow(emp, weekday, dateISO, dopen, dclose, ctx) {
    let start = dopen, end = dclose, soft = false;

    let mode = (emp.availability || {})[String(weekday)] || "yes";
    const ov = ctx.wa[emp.id + ":" + weekday];
    if (ov) mode = ov;
    if (mode === "no" || mode === "home") return { window: null, soft: false };
    if (mode === "vm") end = Math.min(end, DAY_SPLIT);
    else if (mode === "nm") start = Math.max(start, DAY_SPLIT);

    if ((emp.nogo || []).includes(weekday)) return { window: null, soft: false };

    for (const s of emp.school || []) {
      if (s.weekday === weekday) {
        const p = s.period || "ganztags";
        if (p === "ganztags") return { window: null, soft: false };
        if (p === "vm") start = Math.max(start, DAY_SPLIT);
        else if (p === "nm") end = Math.min(end, DAY_SPLIT);
      }
    }

    for (const a of ctx.absences[emp.id] || []) {
      if (!absenceHits(a, dateISO)) continue;
      if (a.priority === "wunsch") { soft = true; continue; }
      const p = a.period || "ganztags";
      if (p === "ganztags") return { window: null, soft: false };
      if (p === "vm") start = Math.max(start, DAY_SPLIT);
      else if (p === "nm") end = Math.min(end, DAY_SPLIT);
      else if (p === "custom" && a.start_time && a.end_time) {
        const as = toMin(a.start_time), ae = toMin(a.end_time);
        if (as <= start && ae >= end) return { window: null, soft: false };
        if (as <= start && start < ae) start = ae;
        if (as < end && end <= ae) end = as;
      }
    }

    if (emp.earliest_start) start = Math.max(start, toMin(emp.earliest_start));
    if (emp.latest_end) end = Math.min(end, toMin(emp.latest_end));

    if (start >= end) return { window: null, soft: false };
    return { window: [start, end], soft };
  }

  /* ------------------------------ Planer ------------------------------ */
  function generate(doc, locationId, year, week, mode = "replan") {
    const ctx = loadContext(doc, locationId, year, week);
    const settings = ctx.settings || {};
    const plannerCfg = settings.planner || {};
    const rules = plannerCfg.rules || {};

    const emps = ctx.employees;
    const byIdMap = {};
    emps.forEach((e) => { byIdMap[e.id] = e; });

    const busy = {};                 // "empId:date" -> [[s,e],...]
    const minutes = {};              // empId -> geleistete Minuten
    const dayLastEnd = {};           // "empId:date" -> spaetestes Ende
    const warnings = [];
    const created = [];
    emps.forEach((e) => { minutes[e.id] = 0; });

    for (const a of ctx.locked) {
      const key = a.employee_id + ":" + a.date;
      (busy[key] = busy[key] || []).push([toMin(a.start_time), toMin(a.end_time)]);
      minutes[a.employee_id] = (minutes[a.employee_id] || 0) + (toMin(a.end_time) - toMin(a.start_time));
    }

    const dates = [];
    for (let d = 1; d <= 7; d++) dates.push(dateFromISOWeek(year, week, d));

    const fairnessKey = (emp) => {
      const soll = (emp.weekly_hours || 40) * 60;
      const ratio = soll ? (minutes[emp.id] || 0) / soll : 1.0;
      return [ratio, -(emp.can_open_close ? 1 : 0), emp.id];
    };
    const cmpFair = (a, b) => {
      const ka = fairnessKey(a), kb = fairnessKey(b);
      for (let i = 0; i < 3; i++) if (ka[i] !== kb[i]) return ka[i] - kb[i];
      return 0;
    };

    function assign(emp, dISO, start, end, kind, opts = {}) {
      const key = emp.id + ":" + dISO;
      (busy[key] = busy[key] || []).push([start, end]);
      minutes[emp.id] = (minutes[emp.id] || 0) + (end - start);
      dayLastEnd[key] = Math.max(dayLastEnd[key] || 0, end);
      created.push({
        location_id: locationId, iso_year: year, iso_week: week,
        employee_id: emp.id, date: dISO,
        start_time: toHHMM(start), end_time: toHHMM(end),
        kind, work_mode: opts.work_mode || "onsite",
        room_id: opts.room_id || null, course_id: opts.course_id || null,
        task_text: opts.task_text || null, status_type: null,
        locked: 0, auto_generated: 1,
      });
    }

    function eligible(emp, dISO, weekday, start, end, needRole) {
      const { window, soft } = onsiteWindow(emp, weekday, dISO, start, end, ctx);
      if (!window) return { ok: false, soft: false };
      const [ws, we] = window;
      if (start < ws || end > we) return { ok: false, soft: false };
      const key = emp.id + ":" + dISO;
      if (!isFree(busy[key] || [], start, end)) return { ok: false, soft: false };

      const alreadyToday = (busy[key] || []).reduce((s, [a, b]) => s + (b - a), 0);
      const maxday = (emp.max_hours_day || 10) * 60;
      if (alreadyToday + (end - start) > maxday && (rules.max_hours_day || "warn") === "enforce")
        return { ok: false, soft: false };

      const maxweek = (emp.max_hours_week || (emp.weekly_hours || 40) + 5) * 60;
      if ((minutes[emp.id] || 0) + (end - start) > maxweek && (rules.max_hours_week || "warn") === "enforce")
        return { ok: false, soft: false };

      const restH = emp.min_rest_hours || 11;
      const prev = dayLastEnd[emp.id + ":" + prevDateISO(dISO)];
      if (prev !== undefined) {
        const gapH = ((24 * 60 - prev) + start) / 60;
        if (gapH < restH && (rules.rest_time || "warn") === "enforce")
          return { ok: false, soft: false };
      }

      if (needRole && !(emp.roles || []).includes(needRole)) return { ok: true, soft: true };
      return { ok: true, soft };
    }

    /* ---- 1) feste Bedarfe: Kurse mit Personal, dann Aufgaben ----------
       Mehrtaegige Kurse (end_date) erzeugen Bedarf an JEDEM Tag im Zeitraum
       (gleiche Uhrzeiten), begrenzt auf die Tage dieser Woche. */
    const weekSet = new Set(dates);
    const demands = [];
    for (const c of ctx.courses) {
      if ((c.staff_needed || 0) > 0) {
        const courseDays = [];
        if (c.end_date && c.end_date > c.date) {
          for (const d of dates) if (d >= c.date && d <= c.end_date) courseDays.push(d);
        } else if (weekSet.has(c.date)) courseDays.push(c.date);
        for (const d of courseDays)
          demands.push({
            date: d, start: toMin(c.start_time), end: toMin(c.end_time),
            count: c.staff_needed, role: c.role_required || null,
            kind: "kurs", room_id: c.room_id || null, course_id: c.id,
            label: c.title || "Kurs",
          });
      }
    }
    for (const t of ctx.tasks) {
      demands.push({
        date: t.date, start: toMin(t.start_time), end: toMin(t.end_time),
        count: t.staff_needed || 1, role: t.role_required || null,
        kind: "zbv", room_id: t.room_id || null, task_text: t.title || null,
        label: t.title || "Aufgabe",
      });
    }

    for (const dm of demands) {
      if (dm.start == null || dm.end == null) continue;
      const weekday = weekdayOfISO(dm.date);
      let picked = 0;
      let cands = [...emps].sort(cmpFair);
      cands = [
        ...cands.filter((e) => !dm.role || (e.roles || []).includes(dm.role)),
        ...cands.filter((e) => dm.role && !(e.roles || []).includes(dm.role)),
      ];
      for (const emp of cands) {
        if (picked >= dm.count) break;
        const { ok } = eligible(emp, dm.date, weekday, dm.start, dm.end, dm.role);
        if (ok) {
          assign(emp, dm.date, dm.start, dm.end, dm.kind, {
            room_id: dm.room_id, course_id: dm.course_id, task_text: dm.task_text,
          });
          picked++;
        }
      }
      if (picked < dm.count)
        warnings.push({
          type: "bedarf", date: dm.date, severity: "warn",
          message: `${dm.label} (${toHHMM(dm.start)}-${toHHMM(dm.end)}): ${dm.count - picked} Person(en) fehlen`,
        });
    }

    /* ---- 2) Grundbesetzung fair auffuellen ---------------------------- */
    const step = ((settings.view || {}).step_minutes | 0) || 30;
    for (const dISO of dates) {
      const weekday = weekdayOfISO(dISO);
      const oc = dayOpenClose(ctx, weekday, dISO);
      if (!oc) continue;
      const [dopen, dclose] = oc;
      const blocks = ctx.cov[weekday] || [];
      if (!blocks.length) continue;

      const steps = [];
      for (let s = dopen; s < dclose; s += step) steps.push(s);
      const need = steps.map((s) => Math.max(0, ...blocks
        .filter((b) => toMin(b.start_time) <= s && s < toMin(b.end_time))
        .map((b) => b.min_staff)));
      const covered = steps.map(() => 0);

      for (const emp of emps) {
        for (const [bs, be] of busy[emp.id + ":" + dISO] || []) {
          steps.forEach((s, i) => { if (bs <= s && s < be) covered[i]++; });
        }
      }

      let guard = 0;
      while (steps.some((_, i) => need[i] > covered[i]) && guard < 200) {
        guard++;
        const gapI = steps.findIndex((_, i) => need[i] > covered[i]);
        const gapStart = steps[gapI];

        let best = null;
        let cands = [...emps].sort(cmpFair);
        if (covered[gapI] === 0) {
          cands = [
            ...cands.filter((e) => e.can_work_alone),
            ...cands.filter((e) => !e.can_work_alone),
          ];
        }
        for (const emp of cands) {
          const { ok, soft } = eligible(emp, dISO, weekday, gapStart, gapStart + step, null);
          if (ok) { best = { emp, soft }; if (!soft) break; }
        }
        if (!best) {
          let last = gapI;
          while (last < steps.length && need[last] > covered[last]) last++;
          warnings.push({
            type: "unterbesetzung", date: dISO, severity: "high",
            message: `Unterbesetzung ${toHHMM(gapStart)}-${toHHMM(steps[last - 1] + step)}`,
          });
          for (let i = gapI; i < last; i++) covered[i] = need[i];
          continue;
        }

        const emp = best.emp;
        const { window } = onsiteWindow(emp, weekday, dISO, dopen, dclose, ctx);
        const [ws, we] = window;
        const maxday = (emp.max_hours_day || 10) * 60;
        const key = emp.id + ":" + dISO;
        const already = (busy[key] || []).reduce((s, [a, b]) => s + (b - a), 0);
        const shiftStart = Math.max(gapStart, ws);
        let shiftEnd = shiftStart;
        let j = gapI;
        while (
          j < steps.length && need[j] > covered[j] && steps[j] + step <= we &&
          (steps[j] + step - shiftStart) + already <= maxday &&
          isFree(busy[key] || [], shiftStart, steps[j] + step)
        ) {
          shiftEnd = steps[j] + step;
          j++;
        }
        if (shiftEnd <= shiftStart) shiftEnd = Math.min(shiftStart + step, we);
        assign(emp, dISO, shiftStart, shiftEnd, "dienst");
        steps.forEach((s, i) => { if (shiftStart <= s && s < shiftEnd) covered[i]++; });
      }

      checkDayWarnings(dISO, steps, step, busy, byIdMap, dclose, rules, warnings);
    }

    /* ---- 3) ins Dokument schreiben (nur nicht-fixierte ersetzen) ------ */
    if (mode === "replan") {
      doc.assignments = doc.assignments.filter(
        (a) => !(a.location_id === locationId && a.iso_year === year && a.iso_week === week && !a.locked)
      );
      for (const rec of created) DP.model.insert(doc, "assignments", rec);
    }

    const hours = {};
    let total = 0;
    for (const [idStr, m] of Object.entries(minutes)) {
      const e = byIdMap[+idStr];
      if (e) hours[e.kuerzel] = Math.round((m / 60) * 10) / 10;
      total += m;
    }
    warnings.sort((a, b) => (a.date + a.type).localeCompare(b.date + b.type));
    return {
      location_id: locationId, year, week,
      created: created.length, warnings, hours,
      total_hours: Math.round((total / 60) * 10) / 10,
    };
  }

  function ranges(sortedSteps, step) {
    const out = [];
    for (const s of sortedSteps) {
      if (out.length && out[out.length - 1][1] === s) out[out.length - 1][1] = s + step;
      else out.push([s, s + step]);
    }
    return out;
  }

  function checkDayWarnings(dISO, steps, step, busy, byIdMap, dclose, rules, warnings) {
    const presentAt = (s) => {
      const ids = [];
      for (const [key, ivs] of Object.entries(busy)) {
        const sep = key.indexOf(":");
        if (key.slice(sep + 1) !== dISO) continue;
        const empId = +key.slice(0, sep);
        for (const [bs, be] of ivs) if (bs <= s && s < be) { ids.push(empId); break; }
      }
      return [...new Set(ids)];
    };

    const azubiAlone = [];
    for (const s of steps) {
      const present = presentAt(s);
      if (!present.length) continue;
      if (!present.some((p) => (byIdMap[p] || {}).can_work_alone)) azubiAlone.push(s);
    }
    if ((rules.azubi_not_alone || "enforce") !== "off") {
      for (const [rs, re] of ranges(azubiAlone, step))
        warnings.push({
          type: "azubi_allein", date: dISO, severity: "warn",
          message: `${toHHMM(rs)}-${toHHMM(re)}: Azubi ohne erlaubte Begleitung`,
        });
    }

    const last = dclose - step;
    const presentEnd = presentAt(last);
    if (presentEnd.length && (rules.closer_present || "warn") !== "off") {
      if (!presentEnd.some((p) => (byIdMap[p] || {}).can_open_close))
        warnings.push({
          type: "kein_schliesser", date: dISO, severity: "warn",
          message: `ab ${toHHMM(last)}: niemand mit Schliessberechtigung`,
        });
    }
  }

  DP.planner = { generate, loadContext, toMin, toHHMM, isoWeekOf, dateFromISOWeek, weekdayOfISO };
})();

/* ICS-Export (Google Kalender) - Port von backend/export_ics.py.
   Mobil-tauglich ohne ZIP: combined-Datei oder je Mitarbeiter eine Datei. */
(function () {
  const DP = (globalThis.DP = globalThis.DP || {});

  const VTIMEZONE = [
    "BEGIN:VTIMEZONE", "TZID:Europe/Berlin",
    "BEGIN:DAYLIGHT", "TZOFFSETFROM:+0100", "TZOFFSETTO:+0200", "TZNAME:CEST",
    "DTSTART:19700329T020000", "RRULE:FREQ=YEARLY;BYMONTH=3;BYDAY=-1SU", "END:DAYLIGHT",
    "BEGIN:STANDARD", "TZOFFSETFROM:+0200", "TZOFFSETTO:+0100", "TZNAME:CET",
    "DTSTART:19701025T030000", "RRULE:FREQ=YEARLY;BYMONTH=10;BYDAY=-1SU", "END:STANDARD",
    "END:VTIMEZONE",
  ];

  const KIND_LABEL = { dienst: "Dienst", kurs: "Kurs", telefon: "Telefondienst", zbv: "Sonderaufgabe", event: "Termin" };

  const esc = (s) => String(s == null ? "" : s)
    .replace(/\\/g, "\\\\").replace(/;/g, "\\;").replace(/,/g, "\\,").replace(/\n/g, "\\n");
  const dt = (dateISO, hhmm) => dateISO.replace(/-/g, "") + "T" + hhmm.replace(":", "") + "00";
  const nextDay = (dateISO) => {
    const [y, m, d] = dateISO.split("-").map(Number);
    const x = new Date(Date.UTC(y, m - 1, d));
    x.setUTCDate(x.getUTCDate() + 1);
    return `${x.getUTCFullYear()}-${String(x.getUTCMonth() + 1).padStart(2, "0")}-${String(x.getUTCDate()).padStart(2, "0")}`;
  };
  const stamp = () => {
    const n = new Date();
    const p = (x) => String(x).padStart(2, "0");
    return `${n.getFullYear()}${p(n.getMonth() + 1)}${p(n.getDate())}T${p(n.getHours())}${p(n.getMinutes())}${p(n.getSeconds())}`;
  };

  function gather(doc, locationId, year, week) {
    const loc = DP.model.byId(doc, "locations", locationId);
    const emps = doc.employees.filter((e) => e.location_id === locationId);
    const rooms = {};
    doc.rooms.filter((r) => r.location_id === locationId).forEach((r) => { rooms[r.id] = r.name; });
    const inWeek = (r) => r.location_id === locationId && r.iso_year === year && r.iso_week === week;
    const assigns = doc.assignments.filter(inWeek)
      .sort((a, b) => (a.date + a.start_time).localeCompare(b.date + b.start_time));
    const courses = {};
    doc.courses.filter(inWeek).forEach((c) => { courses[c.id] = c; });
    const empIds = new Set(emps.map((e) => e.id));
    const absences = doc.absences.filter(
      (a) => a.iso_year === year && a.iso_week === week && empIds.has(a.employee_id));
    const dates = [];
    for (let d = 1; d <= 7; d++) dates.push(DP.planner.dateFromISOWeek(year, week, d));
    const absCat = {};
    (doc.settings.absence_types || []).forEach((t) => { absCat[t.id] = t; });
    return { loc, emps, rooms, assigns, courses, absences, dates, settings: doc.settings, absCat };
  }

  function summary(a, emp, courses, titleFormat) {
    const base = titleFormat
      .replace("{kuerzel}", emp.kuerzel || emp.name)
      .replace("{start}", a.start_time).replace("{end}", a.end_time)
      .replace("{name}", emp.name);
    let detail = "";
    if (a.kind === "kurs") {
      const c = courses[a.course_id];
      detail = "Kurs: " + (c && c.title ? c.title : "Kurs");
    } else if (a.kind === "zbv") detail = a.task_text || "Sonderaufgabe";
    else if (a.kind === "telefon") detail = "Telefondienst" + (a.work_mode === "home" ? " (Zuhause)" : "");
    else if (a.kind !== "dienst") detail = KIND_LABEL[a.kind] || a.kind;
    return detail ? `${base} · ${detail}` : base;
  }

  function employeeEvents(empId, g) {
    const emp = g.emps.find((e) => e.id === empId);
    const titleFormat = g.settings.title_format || "{kuerzel} {start} bis {end}";
    const ts = stamp();
    const lines = [];

    for (const a of g.assigns) {
      if (a.employee_id !== empId) continue;
      const room = g.rooms[a.room_id];
      const locTxt = g.loc.name + (room ? " · " + room : "");
      lines.push(
        "BEGIN:VEVENT",
        `UID:dp-a${a.id}@dienstplaner`,
        `DTSTAMP:${ts}`,
        `DTSTART;TZID=Europe/Berlin:${dt(a.date, a.start_time)}`,
        `DTEND;TZID=Europe/Berlin:${dt(a.date, a.end_time)}`,
        "SUMMARY:" + esc(summary(a, emp, g.courses, titleFormat)),
        "LOCATION:" + esc(locTxt),
        "END:VEVENT",
      );
    }

    for (const ab of g.absences) {
      if (ab.employee_id !== empId) continue;
      const t = g.absCat[ab.type] || { label: ab.type };
      const start = ab.date || g.dates[0];
      const endIncl = ab.end_date || (ab.date ? ab.date : g.dates[6]);
      const end = nextDay(endIncl);
      const per = ab.period;
      const suffix = per && per !== "ganztags" ? ` (${per})` : "";
      lines.push(
        "BEGIN:VEVENT",
        `UID:dp-ab${ab.id}@dienstplaner`,
        `DTSTAMP:${ts}`,
        `DTSTART;VALUE=DATE:${start.replace(/-/g, "")}`,
        `DTEND;VALUE=DATE:${end.replace(/-/g, "")}`,
        "SUMMARY:" + esc(`${emp.kuerzel} ${t.label}${suffix}`),
        "TRANSP:TRANSPARENT",
        "END:VEVENT",
      );
    }
    return lines;
  }

  function wrapCalendar(name, eventLines) {
    const head = [
      "BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//Dienstplaner//DE//v1",
      "CALSCALE:GREGORIAN", "X-WR-CALNAME:" + esc(name), "X-WR-TIMEZONE:Europe/Berlin",
      ...VTIMEZONE,
    ];
    return head.concat(eventLines, ["END:VCALENDAR"]).join("\r\n") + "\r\n";
  }

  /** combined: {filename, content}. */
  function exportCombined(doc, locationId, year, week) {
    const g = gather(doc, locationId, year, week);
    const events = [];
    for (const e of g.emps) events.push(...employeeEvents(e.id, g));
    const kw = "KW" + week;
    return {
      filename: `Dienstplan_${g.loc.kuerzel || g.loc.name}_${kw}.ics`,
      content: wrapCalendar(`Dienstplan ${g.loc.name} ${kw}`, events),
    };
  }

  /** perPerson: Array von {employee_id, kuerzel, name, filename, content} (nur mit Terminen). */
  function exportPerPerson(doc, locationId, year, week) {
    const g = gather(doc, locationId, year, week);
    const kw = "KW" + week;
    const out = [];
    for (const e of g.emps) {
      const events = employeeEvents(e.id, g);
      if (!events.length) continue;
      out.push({
        employee_id: e.id, kuerzel: e.kuerzel, name: e.name,
        filename: `${e.kuerzel || e.id}_${kw}.ics`,
        content: wrapCalendar(`${e.name} · ${kw}`, events),
      });
    }
    return out;
  }

  DP.ics = { exportCombined, exportPerPerson };
})();

/* Minimaler XLSX-Schreiber (ersetzt ExcelJS, ~4 KB statt 844 KB).
   Ein .xlsx ist ein ZIP mit Office-XML. Wir schreiben das ZIP unkomprimiert
   (Methode "store") - das akzeptieren Excel, LibreOffice und openpyxl.

   API:  DP.xlsx.build({ sheets: [ {name, cols, rows, merges, freeze} ] }) -> Uint8Array
     cols   : [{w:26}, ...]
     rows   : [{h:42, cells:[ {v, n?:true, s?:styleId} | null, ... ]}]
     merges : ["A1:H1"]
     freeze : {x:1, y:3}
   Stile ueber DP.xlsx.styles(): .get({bold,size,color,fill,border,align}) -> styleId */
(function () {
  const DP = (globalThis.DP = globalThis.DP || {});

  const enc = (s) => new TextEncoder().encode(s);
  const xmlEsc = (s) => String(s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");

  /* ------------------------------- ZIP -------------------------------- */
  const CRC = new Uint32Array(256);
  for (let i = 0; i < 256; i++) {
    let c = i;
    for (let k = 0; k < 8; k++) c = c & 1 ? 0xEDB88320 ^ (c >>> 1) : c >>> 1;
    CRC[i] = c >>> 0;
  }
  function crc32(buf) {
    let c = 0xFFFFFFFF;
    for (let i = 0; i < buf.length; i++) c = CRC[(c ^ buf[i]) & 0xFF] ^ (c >>> 8);
    return (c ^ 0xFFFFFFFF) >>> 0;
  }

  function zipStore(files) {
    const parts = [], central = [];
    let offset = 0;
    for (const f of files) {
      const nameB = enc(f.name), data = f.data, crc = crc32(data);
      const lh = new Uint8Array(30 + nameB.length);
      const dv = new DataView(lh.buffer);
      dv.setUint32(0, 0x04034b50, true);
      dv.setUint16(4, 20, true); dv.setUint16(6, 0, true); dv.setUint16(8, 0, true);
      dv.setUint16(10, 0, true); dv.setUint16(12, 0x21, true);
      dv.setUint32(14, crc, true);
      dv.setUint32(18, data.length, true); dv.setUint32(22, data.length, true);
      dv.setUint16(26, nameB.length, true); dv.setUint16(28, 0, true);
      lh.set(nameB, 30);
      parts.push(lh, data);

      const ch = new Uint8Array(46 + nameB.length);
      const cv = new DataView(ch.buffer);
      cv.setUint32(0, 0x02014b50, true);
      cv.setUint16(4, 20, true); cv.setUint16(6, 20, true);
      cv.setUint16(8, 0, true); cv.setUint16(10, 0, true);
      cv.setUint16(12, 0, true); cv.setUint16(14, 0x21, true);
      cv.setUint32(16, crc, true);
      cv.setUint32(20, data.length, true); cv.setUint32(24, data.length, true);
      cv.setUint16(28, nameB.length, true);
      cv.setUint32(42, offset, true);
      ch.set(nameB, 46);
      central.push(ch);
      offset += lh.length + data.length;
    }
    const cdSize = central.reduce((s, c) => s + c.length, 0);
    const end = new Uint8Array(22);
    const ev = new DataView(end.buffer);
    ev.setUint32(0, 0x06054b50, true);
    ev.setUint16(8, files.length, true); ev.setUint16(10, files.length, true);
    ev.setUint32(12, cdSize, true); ev.setUint32(16, offset, true);

    const all = parts.concat(central, [end]);
    const total = all.reduce((s, a) => s + a.length, 0);
    const out = new Uint8Array(total);
    let p = 0;
    for (const a of all) { out.set(a, p); p += a.length; }
    return out;
  }

  /* ------------------------------ Stile ------------------------------- */
  const THIN = '<border><left style="thin"><color rgb="FFD6DBE2"/></left><right style="thin"><color rgb="FFD6DBE2"/></right><top style="thin"><color rgb="FFD6DBE2"/></top><bottom style="thin"><color rgb="FFD6DBE2"/></bottom><diagonal/></border>';

  function styles() {
    const fonts = ['<font><sz val="11"/><color rgb="FF1B2A41"/><name val="Calibri"/></font>'];
    const fills = ['<fill><patternFill patternType="none"/></fill>', '<fill><patternFill patternType="gray125"/></fill>'];
    const borders = ['<border><left/><right/><top/><bottom/><diagonal/></border>'];
    const xfs = ['<xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/>'];
    const idx = (arr, xml) => { const i = arr.indexOf(xml); return i >= 0 ? i : arr.push(xml) - 1; };

    function get(s) {
      s = s || {};
      const fi = idx(fonts, `<font><sz val="${s.size || 11}"/>${s.bold ? "<b/>" : ""}<color rgb="${s.color || "FF1B2A41"}"/><name val="Calibri"/></font>`);
      const fl = s.fill ? idx(fills, `<fill><patternFill patternType="solid"><fgColor rgb="${s.fill}"/><bgColor indexed="64"/></patternFill></fill>`) : 0;
      const bo = s.border ? idx(borders, THIN) : 0;
      const a = s.align;
      const al = a ? `<alignment${a.h ? ` horizontal="${a.h}"` : ""}${a.v ? ` vertical="${a.v}"` : ""}${a.wrap ? ' wrapText="1"' : ""}/>` : "";
      const attrs = `numFmtId="0" fontId="${fi}" fillId="${fl}" borderId="${bo}" xfId="0" applyFont="1"${fl ? ' applyFill="1"' : ""}${bo ? ' applyBorder="1"' : ""}${al ? ' applyAlignment="1"' : ""}`;
      return idx(xfs, al ? `<xf ${attrs}>${al}</xf>` : `<xf ${attrs}/>`);
    }
    function xml() {
      return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><fonts count="${fonts.length}">${fonts.join("")}</fonts><fills count="${fills.length}">${fills.join("")}</fills><borders count="${borders.length}">${borders.join("")}</borders><cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs><cellXfs count="${xfs.length}">${xfs.join("")}</cellXfs></styleSheet>`;
    }
    return { get, xml };
  }

  /* ------------------------------ Blätter ----------------------------- */
  function colName(n) {
    let s = "";
    while (n > 0) { const m = (n - 1) % 26; s = String.fromCharCode(65 + m) + s; n = (n - m - 1) / 26; }
    return s;
  }

  function sheetXml(sh) {
    let rows = "";
    (sh.rows || []).forEach((row, ri) => {
      const r = ri + 1;
      let cells = "";
      (row.cells || []).forEach((c, ci) => {
        if (!c) return;
        const ref = colName(ci + 1) + r;
        const sAttr = c.s != null ? ` s="${c.s}"` : "";
        if (c.v == null || c.v === "") { if (c.s != null) cells += `<c r="${ref}"${sAttr}/>`; return; }
        if (c.n) cells += `<c r="${ref}"${sAttr}><v>${c.v}</v></c>`;
        else cells += `<c r="${ref}"${sAttr} t="inlineStr"><is><t xml:space="preserve">${xmlEsc(c.v)}</t></is></c>`;
      });
      rows += `<row r="${r}"${row.h ? ` ht="${row.h}" customHeight="1"` : ""}>${cells}</row>`;
    });
    const cols = (sh.cols || []).length
      ? `<cols>${sh.cols.map((c, i) => `<col min="${i + 1}" max="${i + 1}" width="${c.w}" customWidth="1"/>`).join("")}</cols>`
      : "";
    const fz = sh.freeze
      ? `<pane xSplit="${sh.freeze.x}" ySplit="${sh.freeze.y}" topLeftCell="${colName(sh.freeze.x + 1)}${sh.freeze.y + 1}" activePane="bottomRight" state="frozen"/><selection pane="bottomRight"/>`
      : "";
    const merges = (sh.merges || []).length
      ? `<mergeCells count="${sh.merges.length}">${sh.merges.map((m) => `<mergeCell ref="${m}"/>`).join("")}</mergeCells>`
      : "";
    return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetViews><sheetView showGridLines="0" workbookViewId="0">${fz}</sheetView></sheetViews><sheetFormatPr defaultRowHeight="15"/>${cols}<sheetData>${rows}</sheetData>${merges}</worksheet>`;
  }

  function build({ sheets, stylesXml }) {
    const files = [];
    const sheetOverrides = sheets.map((_, i) =>
      `<Override PartName="/xl/worksheets/sheet${i + 1}.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>`).join("");
    files.push({
      name: "[Content_Types].xml",
      data: enc(`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>${sheetOverrides}<Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/></Types>`),
    });
    files.push({
      name: "_rels/.rels",
      data: enc(`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>`),
    });
    files.push({
      name: "xl/workbook.xml",
      data: enc(`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets>${sheets.map((s, i) => `<sheet name="${xmlEsc(s.name)}" sheetId="${i + 1}" r:id="rId${i + 1}"/>`).join("")}</sheets></workbook>`),
    });
    files.push({
      name: "xl/_rels/workbook.xml.rels",

/* Excel-Export - Blatt "Aushang" (farbiges Wochenraster) + "Abrechnung".
   Nutzt den eigenen Mini-Schreiber DP.xlsx (kein ExcelJS mehr). */
(function () {
  const DP = (globalThis.DP = globalThis.DP || {});

  const WD = ["Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag", "Sonntag"];
  const MONTHS = ["", "Januar", "Februar", "März", "April", "Mai", "Juni", "Juli",
    "August", "September", "Oktober", "November", "Dezember"];
  const KIND_MARK = { kurs: "Kurs", telefon: "Tel", zbv: "zbV", event: "Termin" };
  const NAVY = "FF1B2A41";

  const toMin = (t) => { const [h, m] = t.split(":"); return +h * 60 + +m; };
  const argb = (hex) => "FF" + (hex || "#888888").replace("#", "").toUpperCase();

  function textColor(hex) {
    const h = (hex || "#888888").replace("#", "");
    const lin = (c) => (c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4));
    const v = (i) => lin(parseInt(h.slice(i, i + 2), 16) / 255);
    const L = 0.2126 * v(0) + 0.7152 * v(2) + 0.0722 * v(4);
    return L > 0.5 ? "FF12212F" : "FFF2F6FB";
  }

  function absOn(absences, empId, iso, absCat) {
    const out = [];
    for (const ab of absences) {
      if (ab.employee_id !== empId) continue;
      const hit = !ab.date || (ab.end_date && ab.date <= iso && iso <= ab.end_date) || ab.date === iso;
      if (hit) {
        const lbl = (absCat[ab.type] || {}).label || ab.type;
        const per = ab.period;
        out.push(lbl + (per && per !== "ganztags" ? ` (${per})` : ""));
      }
    }
    return out;
  }

  /** Liefert {filename, buffer(Uint8Array)} */
  async function exportExcel(doc, locationId, year, week) {
    const loc = DP.model.byId(doc, "locations", locationId);
    const emps = doc.employees
      .filter((e) => e.location_id === locationId && e.active)
      .sort((a, b) => (a.sort || 0) - (b.sort || 0) || a.id - b.id);
    const inWeek = (r) => r.location_id === locationId && r.iso_year === year && r.iso_week === week;
    const assigns = doc.assignments.filter(inWeek).sort((a, b) => a.start_time.localeCompare(b.start_time));
    const empIds = new Set(emps.map((e) => e.id));
    const absences = doc.absences.filter(
      (a) => a.iso_year === year && a.iso_week === week && empIds.has(a.employee_id));
    const absCat = {};
    (doc.settings.absence_types || []).forEach((t) => { absCat[t.id] = t; });
    const dates = [];
    for (let d = 1; d <= 7; d++) dates.push(DP.planner.dateFromISOWeek(year, week, d));

    const d0 = dates[0].split("-"), d6 = dates[6].split("-");
    const rng = `${+d0[2]}.–${+d6[2]}. ${MONTHS[+d6[1]]} ${d6[0]}`;

    const st = DP.xlsx.styles();
    const sTitle = st.get({ bold: true, size: 14, color: NAVY });
    const sHead = st.get({ bold: true, color: "FFF2F6FB", fill: NAVY, border: true, align: { h: "center" } });
    const sHeadLeft = st.get({ bold: true, color: "FFF2F6FB", fill: NAVY, border: true });
    const sCell = st.get({ border: true, align: { h: "center", v: "top", wrap: true } });
    const sNum = st.get({ border: true, align: { h: "center" } });
    const sNumBold = st.get({ bold: true, border: true, align: { h: "center" } });
    const sName = st.get({ border: true });
    const sPos = st.get({ color: "FF1E7B34", border: true, align: { h: "center" } });
    const sNeg = st.get({ color: "FFB00020", border: true, align: { h: "center" } });

    /* ---------------------------- Aushang ---------------------------- */
    const aushang = { name: "Aushang", freeze: { x: 1, y: 3 }, merges: ["A1:H1"], rows: [], cols: [{ w: 26 }] };
    for (let c = 0; c < 7; c++) aushang.cols.push({ w: 15 });

    aushang.rows.push({ h: 24, cells: [{ v: `Dienstplan · ${loc.name} · KW ${week} · ${rng}`, s: sTitle }] });
    aushang.rows.push({ cells: [] });
    aushang.rows.push({
      cells: [{ v: "Mitarbeiter", s: sHeadLeft }].concat(dates.map((iso, i) => {
        const [, m, d] = iso.split("-").map(Number);
        return { v: `${WD[i].slice(0, 2)} ${d}.${m}.`, s: sHead };
      })),
    });

    for (const emp of emps) {
      const sEmp = st.get({ bold: true, color: textColor(emp.color), fill: argb(emp.color), border: true, align: { v: "center" } });
      const cells = [{ v: `${emp.kuerzel || ""}  ${emp.name}`, s: sEmp }];
      for (const iso of dates) {
        const parts = [];
        for (const a of assigns) {
          if (a.employee_id === emp.id && a.date === iso) {
            const mark = KIND_MARK[a.kind] || "";
            const home = a.work_mode === "home" ? " ⌂" : "";
            parts.push(`${a.start_time}–${a.end_time}${mark ? " " + mark : ""}${home}`);
          }
        }
        parts.push(...absOn(absences, emp.id, iso, absCat));
        cells.push({ v: parts.join("\n"), s: sCell });
      }
      aushang.rows.push({ h: 42, cells });
    }

    /* -------------------------- Abrechnung --------------------------- */
    const abr = { name: "Abrechnung", freeze: { x: 1, y: 3 }, merges: ["A1:K1"], rows: [], cols: [{ w: 26 }] };
    for (let c = 0; c < 10; c++) abr.cols.push({ w: 8 });

    abr.rows.push({ cells: [{ v: `Stundenabrechnung · ${loc.name} · KW ${week}`, s: st.get({ bold: true, size: 13, color: NAVY }) }] });
    abr.rows.push({ cells: [] });
    abr.rows.push({
      cells: [{ v: "Mitarbeiter", s: sHeadLeft }]
        .concat(WD.map((w) => ({ v: w.slice(0, 2), s: sHead })))
        .concat([{ v: "Summe", s: sHead }, { v: "Soll", s: sHead }, { v: "Diff", s: sHead }]),
    });

    for (const emp of emps) {
      const dayMin = [0, 0, 0, 0, 0, 0, 0];
      for (const a of assigns) {
        if (a.employee_id !== emp.id || a.kind === "event") continue;
        const idx = dates.indexOf(a.date);
        if (idx >= 0) dayMin[idx] += toMin(a.end_time) - toMin(a.start_time);
      }
      let total = 0;
      const cells = [{ v: `${emp.kuerzel || ""} ${emp.name}`, s: sName }];
      dayMin.forEach((m) => {
        const h = m / 60; total += h;
        cells.push({ v: h ? Math.round(h * 100) / 100 : "", n: !!h, s: sNum });
      });
      const soll = emp.weekly_hours || 0;
      const diff = Math.round((total - soll) * 100) / 100;
      cells.push({ v: Math.round(total * 100) / 100, n: true, s: sNumBold });
      cells.push({ v: soll, n: true, s: sNum });
      cells.push({ v: diff, n: true, s: diff < 0 ? sNeg : sPos });
      abr.rows.push({ cells });
    }

    const buffer = DP.xlsx.build({ sheets: [aushang, abr], stylesXml: st.xml() });
    return { filename: `Dienstplan_${loc.kuerzel || loc.name}_KW${week}.xlsx`, buffer };
  }

  DP.excel = { exportExcel };
})();

/* Speicher-Schicht mit austauschbarem Backend.
   - local : localStorage (Arbeits-Cache / Offline-Puffer). Immer aktiv.
   - drive : Google Drive via window.claude.mcp (Artifact) - Phase 4.
             JSON-Snapshots "dienstplaner-daten-<zeit>.json", neueste gewinnt.
   Merge-Regel: beim Start neuesten Drive-Stand laden, sonst localStorage,
   sonst Demo-Seed. Jede Aenderung -> localStorage sofort, Drive gedrosselt. */
(function () {
  const DP = (globalThis.DP = globalThis.DP || {});

  const LS_KEY = "dp-doc-v1";
  const FILE_PREFIX = "dienstplaner-daten-";

  const state = {
    doc: null,
    driveEnabled: false,      // Phase 4: true, wenn mcp-Capability vorhanden
    driveStatus: "aus",       // aus | ok | fehler | laedt
    lastSavedAt: null,
    saveTimer: null,
    listeners: [],
  };

  /* ------------------------------ intern ------------------------------ */
  function nowStamp() {
    const n = new Date();
    const p = (x) => String(x).padStart(2, "0");
    return `${n.getFullYear()}-${p(n.getMonth() + 1)}-${p(n.getDate())}_${p(n.getHours())}-${p(n.getMinutes())}-${p(n.getSeconds())}`;
  }

  function loadLocal() {
    try {
      const raw = globalThis.localStorage && localStorage.getItem(LS_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) { /* kein localStorage / kaputt */ }
    return null;
  }

  function saveLocal(doc) {
    try {
      if (globalThis.localStorage) localStorage.setItem(LS_KEY, JSON.stringify(doc));
    } catch (e) { /* Speicher voll o.ae. - Drive/Export bleiben */ }
  }

  function notify() { state.listeners.forEach((fn) => { try { fn(state); } catch (e) {} }); }

  /* --------------------------- Drive (Phase 4) ------------------------ */
  // Wird in Phase 4 mit echten window.claude.mcp-Aufrufen gefuellt.
  // Schnittstelle: driveAdapter = { listNewest():Promise<{name,content}|null>,
  //                                 save(name, content):Promise<void> }
  let driveAdapter = null;
  function setDriveAdapter(adapter) {
    driveAdapter = adapter;
    state.driveEnabled = !!adapter;
    state.driveStatus = adapter ? "ok" : "aus";
    notify();
  }

  async function loadFromDrive() {
    if (!driveAdapter) return null;
    state.driveStatus = "laedt"; notify();
    try {
      const newest = await driveAdapter.listNewest();
      state.driveStatus = "ok"; notify();
      if (newest && newest.content) return JSON.parse(newest.content);
    } catch (e) {
      state.driveStatus = "fehler"; notify();
    }
    return null;
  }

  async function saveToDrive(doc) {
    if (!driveAdapter) return;
    try {
      await driveAdapter.save(FILE_PREFIX + nowStamp() + ".json", JSON.stringify(doc));
      state.driveStatus = "ok";
      state.lastSavedAt = new Date();
    } catch (e) {
      state.driveStatus = "fehler";
    }
    notify();
  }

  /* ------------------------------ API --------------------------------- */
  async function init() {
    let doc = null;
    if (state.driveEnabled) doc = await loadFromDrive();
    if (!doc) doc = loadLocal();
    if (!doc) doc = DP.model.seedDemo(DP.model.emptyDoc());
    DP.model.migrate(doc);
    state.doc = doc;
    saveLocal(doc);
    notify();
    return doc;
  }

  /** Nach jeder Aenderung aufrufen: sofort lokal, Drive gedrosselt (8s). */
  function markDirty() {
    saveLocal(state.doc);
    if (state.driveEnabled) {
      clearTimeout(state.saveTimer);
      state.saveTimer = setTimeout(() => saveToDrive(state.doc), 8000);
    }
    notify();
  }

  /** Sofort speichern (z.B. Knopf "Jetzt sichern" / vor Export). */
  async function flush() {
    saveLocal(state.doc);
    clearTimeout(state.saveTimer);
    if (state.driveEnabled) await saveToDrive(state.doc);
  }

  function exportJSON() {
    return {
      filename: FILE_PREFIX + nowStamp() + ".json",
      content: JSON.stringify(state.doc, null, 1),
    };
  }

  function importJSON(text) {
    const doc = JSON.parse(text);
    if (!doc || doc.schema !== "dienstplaner-mobil-v1") throw new Error("Unbekanntes Datei-Format");
    state.doc = doc;
    saveLocal(doc);
    notify();
    return doc;
  }

  function resetDemo() {
    state.doc = DP.model.seedDemo(DP.model.emptyDoc());
    saveLocal(state.doc);
    notify();
    return state.doc;
  }

  const onChange = (fn) => state.listeners.push(fn);

  DP.storage = {
    state, init, markDirty, flush, exportJSON, importJSON, resetDemo,
    setDriveAdapter, FILE_PREFIX,
  };
})();

        <button class="btn btn--icon btn--ghost" data-a="theme">${icon(document.documentElement.dataset.theme === "light" ? "moon" : "sun")}</button>
      </header>
      <div class="screen" id="screen"></div>
      <nav class="tabs">${tabs.map(([id, ic, lb]) =>
        `<button class="${S.tab === id ? "on" : ""}" data-tab="${id}">${icon(ic)}<span>${lb}</span></button>`).join("")}</nav>
      <div class="toasts" id="toasts"></div>`;

    $(".hdr").onclick = (e) => {
      const b = e.target.closest("[data-a]"); if (!b) return;
      if (b.dataset.a === "theme") {
        const cur = document.documentElement.dataset.theme || "dark";
        document.documentElement.dataset.theme = cur === "light" ? "dark" : "light";

        render();
      } else if (b.dataset.a === "loc") pickLocation();
    };

      const b = e.target.closest("[data-tab]"); if (!b) return;

    else if (S.tab === "setup") renderSetup(scr);
    else if (S.tab === "mails") renderMails(scr);
    else if (S.tab === "team") renderTeam(scr);
    else renderExport(scr);

  function pickLocation() {
    const body = `<div class="list">${S.doc.locations.map((l) => `
      <button class="item" data-loc="${l.id}"><span class="bar" style="--c:${esc(l.color)}"></span>
        <span class="bd"><span class="ti">${esc(l.name)}</span>
        <span class="mt">${S.doc.employees.filter((e) => e.location_id === l.id && e.active !== 0).length} Mitarbeiter</span></span>
        ${l.id === S.locId ? '<span class="tag" style="--c:var(--accent)">aktiv</span>' : ""}</button>`).join("")}</div>`;
    const { dlg, close } = sheet({ title: "Standort", body, foot: '<button class="btn btn--block" data-x>Schließen</button>' });
    dlg.addEventListener("click", (e) => {
      const b = e.target.closest("[data-loc]"); if (!b) return;
      S.locId = +b.dataset.loc; close(); render();
    });
