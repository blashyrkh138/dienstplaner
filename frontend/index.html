<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dienstplaner</title>
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/app.css" />
  <script>
    // Theme vor dem Rendern setzen (kein Aufblitzen)
    try {
      var t = localStorage.getItem('dp-theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    } catch (e) {}
  </script>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand__mark" id="brandMark"></div>
        <div>
          <div class="brand__title">Dienstplaner</div>
          <div class="brand__sub">Fortbildungszentren</div>
        </div>
      </div>

      <div class="side-label">Standorte</div>
      <div class="loc-list" id="locList"></div>

      <div class="side-label">Bereiche</div>
      <nav class="nav" id="nav"></nav>

      <div class="side-foot">
        <div class="side-foot__user">
          <div class="side-foot__name">Nini</div>
          <div class="side-foot__role">Personalplanung</div>
        </div>
        <button class="btn btn--icon btn--ghost" id="themeToggle" title="Hell/Dunkel"></button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar" id="topbar"></div>
      <section class="content" id="content" style="min-height:0; display:flex; flex-direction:column;"></section>
    </main>
  </div>

  <div class="toast-wrap" id="toasts"></div>

  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer__head">
      <div class="drawer__title" id="drawerTitle">Warnungen</div>
      <button class="btn btn--icon btn--ghost" id="drawerClose" title="Schließen">✕</button>
    </div>
    <div class="drawer__body" id="drawerBody"></div>
  </aside>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
